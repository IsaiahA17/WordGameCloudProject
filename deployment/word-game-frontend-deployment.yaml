apiVersion: apps/v1
kind: Deployment
metadata:
  name: word-game-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: word-game-frontend
  template:
    metadata:
      labels:
        app: word-game-frontend
    spec:
      containers:
      - name: word-game-frontend
        image: nash781/word-game-frontend:v10
        ports:
        - containerPort: 80